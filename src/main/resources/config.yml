server_id: "bear_backup"

onnx_model_path: "plugins/MLPLoadPredictor/mlp_player_classifier.onnx"
unknown_threshold: 0.55

# MySQL
mysql:
  url: "jdbc:mysql://127.0.0.1:3306/mc_analytics?useSSL=false&serverTimezone=UTC"
  username: "mc_user"
  password: "mc_pass"
  pool_size: 8

window_minutes: 30

# Add cpu, memory, and tps to the regression if needed
regression:
  target: "cpu"
  intercept: 8.0
  beta:
    AFK:        0.2
    Build:      1.3
    Explorer:   0.9
    Explosive:  1.8
    PvP:        2.0
    Redstone:   1.7
    Social:     0.7
    Survival:   1.0
  ar:
    y_lag1: 0.45
    y_lag2: 0.20

lstm:
  enabled: false
  base_url: "http://127.0.0.1:8900"
  timeout_ms: 2000

# the most basic autoscaling strategy
# with more accurate prediction and scaling, set enable to false and download https://github.com/kfcisme/orchestrator-paper instead.
autoscale:
  enabled: false
  cpu_thresholds: [60, 130, 190, 250]
  cool_down_minutes: 10
